name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: 87f000053c6198ee887e7781685c58f1
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  NODE_VERSION: 24.18.0
  WRANGLER_VERSION: 4.104.0

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Verify deploy credentials
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN repository secret."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:production

      - name: Deploy with Wrangler
        run: >
          npx wrangler@${WRANGLER_VERSION}
          pages deploy dist
          --project-name=blog-mum
          --branch=main
          --commit-hash=${GITHUB_SHA}
